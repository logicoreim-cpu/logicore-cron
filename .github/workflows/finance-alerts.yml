name: Finance Alerts

on:
  # Disabled 2026-06-26 — GitHub's free scheduler proved unreliable for the
  # Spotify poller (multi-hour gaps), so this moved to Vercel's own Cron too
  # (see vercel.json) before the same problem hit here. Kept as a manual fallback.
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check budgets and upcoming bills
        run: |
          curl -sS -X GET https://logicore.im/api/finance/check-alerts \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -w "\nHTTP %{http_code}\n"
