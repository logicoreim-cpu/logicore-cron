name: Spotify Poll

on:
  # Disabled 2026-06-26 — GitHub's free scheduler was running this with multi-hour
  # gaps instead of every 5 minutes, missing real listening data. Polling now runs
  # on Vercel's own Cron (see vercel.json), which is far more reliable. Kept here
  # as a manual fallback only.
  workflow_dispatch: {}

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Spotify poll
        run: |
          curl -sS -X GET https://logicore.im/api/spotify/cron-poll \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -w "\nHTTP %{http_code}\n"
